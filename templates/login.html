{% extends "base.html" %}
{% block content %}
<div class="form-box">
    <h2>Login</h2>
    <form method="post">
        <label>Full Name: </label>
        <input type="text" name="fullname" required>

        <label>Password:</label>
        <input type="password" name="password" required>
        
        <button type="submit">Login</button>
    </form>
    <p class="auth">
        Don't have an account? <a href="{{ url_for('register') }}" class="auth-link">
            Register here</a>
    </p>
</div>
{% endblock %}
