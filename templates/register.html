{% extends "base.html" %}
{% block content %}
<div class="form-box">
    <h2>Register</h2>
    <form method="post">
        <label>Full Name: </label>
        <input class="input-login" type="text" name="firstname" required>

        <label>Password:</label>
        <input class="input-login" type="password" name="password" required>
        <button type="submit">Register</button>
    </form>
    <p class="auth">
        Already have an account? <a href="{{ url_for('login') }}" class="auth-link"> Login here</a>
    </p>
</div>
{% endblock %}
