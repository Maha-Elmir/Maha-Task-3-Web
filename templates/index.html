{% extends "base.html" %}
{% block content %}
<div class="connect">
    <h2 class="connect">Students</h2>
    {% for student in students %}
    <div class="student-list">
        <!-- Copilot Code -->
        <ul>
            <p>- <a href="{{url_for('student', student_id=student['id'])}}">{{student['firstname']}} {{student['lastname']}}</p></a>
        </ul>
        <!-- Maha's Code -->
    </div>
    {% endfor %}
    <h2 class="connect">Subjects</h2>
    {% for subject in subjects %}
    <div class="subject-list">
        <ul>
            <p>- <a href="{{url_for('subject', subject_id=subject['id'])}}">{{subject['subject']}}</p></a>
        </ul>
    </div>
    {% endfor %}
</div>
{% endblock %}
